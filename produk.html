<!DOCTYPE html>

<head>

    <title>Product</title>
    <link rel="stylesheet" href="style/produk.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    
    <nav class="navbar">
        <img class="logo" src="../assets/logo-sl-1_optimized.webp" alt="logo">

        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
            <!-- ham -->
            <svg id="icon-ham" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                 fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M4 6l16 0"/><path d="M4 12l16 0"/><path d="M4 18l16 0"/>
            </svg>

            <!-- close -->
            <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                 fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 style="display:none">
              <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
              <path d="M18 6l-12 12"/><path d="M6 6l12 12"/>
            </svg>
          </button>

            <ul class="navbar-nav">
                <li><a href="home.html">HOME</a></li>
                <li><a href="menu.html">MENU</a></li>
                <li><a href="produk.html">PRODUCT</a></li>
            </ul>
        <div class="gb-btn"><a href="#">Guest Book</a></div>
    </nav>

    <div class="product-container">

        <!-- HEADLINE -->
        <h1 class="headline1">OUR PRODUCT</h1>

        
        <div class="filter-btns">
            <button onclick="filterProduct('all')">All</button>
            <button onclick="filterProduct('best-seller')">Best Seller</button>
            <button onclick="filterProduct('PNS')">Produk Non Sawit</button>
            <button onclick="filterProduct('PS')">Produk Sawit</button>
            <button onclick="filterProduct('PNS')">Produk Non Sawit</button>
        </div>

        <!-- CARD PRODUCT -->
        <div class="card-product">
            <div class="product best-seller">
                <img class="p-img" src="../assets/bibit kelapa sawit1.jpg" alt="">
                <div class="desc">
                    <h3>Bibit Kelapa Sawit</h3>
                    <div class="price-tag">
                        <div class="price">Rp.6000</div>
                        <div class="next-btn">
                            <a href="../category/bibit-kelapa-sawit.html">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-right"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M13 18l6 -6" /><path d="M13 6l6 6" /></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="product best-seller">
                <img class="p-img" src="../assets/kakao1.jpg" alt="">
                <div class="desc">
                    <h3>Benih Kakao</h3>
                    <div class="price-tag">
                        <div class="price">Rp.650</div>
                        <div class="next-btn">
                            <a href="../category/benih-kakao.html">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-right"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M13 18l6 -6" /><path d="M13 6l6 6" /></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="product best-seller">
                <img class="p-img" src="../assets/kecambah1.jpg" alt="">
                <div class="desc">
                    <h3>Kecambah Kelapa Sawit</h3>
                    <div class="price-tag">
                        <div class="price">Rp.8000</div>
                        <div class="next-btn">
                            <a href="../category/kecambah.html">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-right"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 12l14 0" /><path d="M13 18l6 -6" /><path d="M13 6l6 6" /></svg>
